name: RaichoDemo CI
on: [push, pull_request]
jobs:
  build-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol bc
      - name: Run all 51 quality gates
        run: bash tests/build_all.sh
      - name: M-scale smoke (reduced)
        run: |
          python3 tools/gen_scale_m.py --months 12 --denbun 50000
          bash tests/perf_m.sh
